    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {

      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 40px 36px;
      width: min(520px, 100%);
      box-shadow: 0 8px 40px rgba(42,37,35,.12);

    /* ── Logo ── */

      justify-content: center;
      gap: 14px;
      margin-bottom: 8px;
    }
    .logo-text {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -.01em;
      color: var(--brand);
    }
    .subtitle {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      font-weight: 720;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      border: 1px solid var(--line-2);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--ink);
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-soft);
    }

    /* ── Buttons ── */
    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
      font-size: 14px;
      padding: 12px 20px;
      transition: background .15s, transform .1s;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); }
    button:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--brand-d); }
    .btn-migrate {
      background: var(--brand);
      color: #fff;
      font-size: 15px;
      padding: 14px 20px;
      border-radius: 10px;
    }
    .btn-migrate:hover:not(:disabled) { background: var(--brand-d); }

    .banner {
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 14px;
      display: none;
    }
    .banner.error { background: var(--excl-soft); border: 1px solid #f0c0bc; color: var(--excl); display: block; }
    .banner.success { background: var(--ok-soft); border: 1px solid #a8d5bb; color: var(--ok); display: block; }

    /* ── Sections ── */
    #loginSection, #migrateSection { display: none; }
    #loginSection.active, #migrateSection.active { display: block; }

      border-top: 1px solid var(--line);

      align-items: center;
      justify-content: space-between;
      background: var(--brand-soft);
      border: 1px solid var(--brand-soft2);

      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 13px;

    .btn-logout {

      padding: 5px 12px;
      font-size: 12px;
      border-radius: 6px;
      width: auto;
      font-weight: 600;
    }
    .btn-logout:hover:not(:disabled) { background: var(--brand-soft2); transform: none; }

    /* ── Progress log ── */

    .progress-log {
      background: var(--gray-soft);

    .log-ok { color: var(--ok); }

      padding: 16px 18px;
      margin-top: 18px;
      display: none;
    }
    .summary-box.done { display: block; background: var(--ok-soft); border: 1px solid #a8d5bb; }
    .summary-box.done p { color: var(--ok); font-size: 15px; font-weight: 700; }
    .summary-box.done small { color: var(--ink-2); font-size: 12px; }
  </style>
</head>

// ── UI helpers ────────────────────────────────────────────────────────────────
function showLogin()   { document.getElementById("loginSection").classList.add("active");   document.getElementById("migrateSection").classList.remove("active"); }
function showMigrate() { document.getElementById("migrateSection").classList.add("active"); document.getElementById("loginSection").classList.remove("active"); }

function setLoginError(msg) {
  const el = document.getElementById("loginError");
  el.textContent = msg;
  el.className = "banner" + (msg ? " error" : "");
}

function setMigrateError(msg) {
  const el = document.getElementById("migrateError");
  el.textContent = msg;
  el.className = "banner" + (msg ? " error" : "");
}

function log(msg, cls) {
  const box = document.getElementById("progressLog");
  const line = document.createElement("div");
  if (cls) line.className = cls;
  line.textContent = msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

// ── Auth state ────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("userEmailDisplay").textContent = user.email;
    showMigrate();
  } else {
    showLogin();
  }
});

// ── Login ─────────────────────────────────────────────────────────────────────
window.doLogin = async function () {
  const email    = document.getElementById("emailInput").value.trim();
  const password = document.getElementById("passwordInput").value;
  const btn      = document.getElementById("loginBtn");

  setLoginError("");
  if (!email || !password) { setLoginError("Por favor, introduce email y contraseña."); return; }

  btn.disabled = true;
  btn.textContent = "Iniciando sesión…";
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (err) {
    setLoginError(friendlyAuthError(err.code));
    btn.disabled = false;
    btn.textContent = "Iniciar sesión";
  }
};

window.doLogout = async function () {
  await signOut(auth);
};

function friendlyAuthError(code) {
  switch (code) {
    case "auth/user-not-found":
    case "auth/wrong-password":
    case "auth/invalid-credential": return "Email o contraseña incorrectos.";
    case "auth/too-many-requests":  return "Demasiados intentos. Espera un momento e inténtalo de nuevo.";
    case "auth/invalid-email":      return "Email no válido.";
    default:                        return "Error de autenticación: " + code;
  }
}

// Allow Enter key to submit login
document.getElementById("passwordInput").addEventListener("keydown", e => {
  if (e.key === "Enter") window.doLogin();
});
document.getElementById("emailInput").addEventListener("keydown", e => {
  if (e.key === "Enter") window.doLogin();
});

// ── Migration ─────────────────────────────────────────────────────────────────
window.doMigrate = async function () {
  const btn = document.getElementById("migrateBtn");
  const progressWrap = document.getElementById("progressWrap");
  const summaryBox   = document.getElementById("summaryBox");

  setMigrateError("");
  btn.disabled = true;
  btn.textContent = "Migrando…";
  progressWrap.classList.add("visible");
  document.getElementById("progressLog").innerHTML = "";
  summaryBox.className = "summary-box";

  let rfqsUploaded = 0;
  let errors = 0;

  try {
    // 1. Upload settings
    log("⏳ Subiendo settings (customers, suppliers, serviceTypes)…");
    await setDoc(doc(db, "app", "settings"), SETTINGS);
    log("✅ Settings subidos correctamente.", "log-ok");

    // 2. Upload RFQs
    for (let i = 0; i < RFQS.length; i++) {
      const rfq = RFQS[i];
      const docId = String(rfq.id);
      log(`⏳ Subiendo RFQ ${i + 1}/${RFQS.length} — ${rfq.pn}`);
      try {
        await setDoc(doc(db, "rfqs", docId), rfq);
        log(`✅ RFQ ${i + 1}/${RFQS.length} subido (${docId}).`, "log-ok");
        rfqsUploaded++;
      } catch (rfqErr) {
        log(`❌ Error en RFQ ${docId}: ${rfqErr.message}`, "log-err");
        errors++;
      }
    }

    // 3. Summary
    const summaryText   = document.getElementById("summaryText");
    const summaryDetail = document.getElementById("summaryDetail");
    if (errors === 0) {
      summaryText.textContent   = `✅ Migración completada — ${rfqsUploaded} RFQs subidos`;
      summaryDetail.textContent = "Settings y todos los RFQs se han guardado en Firestore correctamente.";
      log(`\n🎉 Migración completada. ${rfqsUploaded} RFQs subidos sin errores.`, "log-ok");
    } else {
      summaryText.textContent   = `⚠️ Migración con errores — ${rfqsUploaded} RFQs subidos, ${errors} fallidos`;
      summaryDetail.textContent = "Revisa el log para ver los RFQs que fallaron.";
      log(`\n⚠️ Migración terminada con ${errors} error(es).`, "log-err");
    }
    summaryBox.className = "summary-box done";
    btn.textContent = "🚀 Migrar datos a Firebase";
    btn.disabled = false;

  } catch (err) {
    log(`❌ Error fatal: ${err.message}`, "log-err");
    setMigrateError("Error durante la migración: " + err.message);
    btn.textContent = "🚀 Migrar datos a Firebase";
    btn.disabled = false;
  }
};
</script>
